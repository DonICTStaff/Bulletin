<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ code }} — Bulletin Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>
    <main class="login-page">
        <div class="login-card" role="alert">
            <div class="login-card__logo">
                <div class="login-card__title" style="font-size:3rem; color:var(--danger, #dc3545);">{{ code }}</div>
                <div class="login-card__subtitle">{{ message }}</div>
            </div>
            {% if current_user.is_authenticated %}
            <a href="/dashboard" class="btn btn--primary" style="display:inline-block; margin-top:var(--space-3);">Back to Dashboard</a>
            {% else %}
            <a href="/" class="btn btn--primary" style="display:inline-block; margin-top:var(--space-3);">Sign In</a>
            {% endif %}
        </div>
    </main>
</body>
</html>
