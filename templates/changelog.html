<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Changelog — Bulletin Board</title>
</head>
<body>
    <div class="shell">
        <nav class="sidebar">
            <div class="sidebar__brand">
                <img src="{{ url_for('static', filename='donlogo.jpg') }}" alt="Don College">
                <div>
                    <div class="sidebar__brand-text">Bulletin</div>
                    <div class="sidebar__brand-sub">Digital Signage</div>
                </div>
            </div>
            <div class="sidebar__nav">
                <div class="sidebar__section">Info</div>
                <a href="/changelog" class="sidebar__link active">
                    <span class="sidebar__link-icon">📋</span> Changelog
                </a>
            </div>
            <div class="sidebar__footer">
                <a href="/" style="color:#94a3b8; font-size:.8rem;">Back to login</a>
            </div>
        </nav>

        <div class="main">
            <header class="header">
                <div class="header__title">Changelog</div>
            </header>
            <div class="content">
                <div class="card">
                    <div class="card__body">
                        <pre style="font-family:var(--font); font-size:.9rem; line-height:1.8; white-space:pre-wrap; color:var(--text);">{{ content }}</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
