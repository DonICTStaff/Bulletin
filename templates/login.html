<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login — Bulletin Board</title>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-card__logo">
                <img src="{{ url_for('static', filename='donlogo.jpg') }}" alt="Don College">
                <div class="login-card__title">Bulletin Board</div>
                <div class="login-card__subtitle">Sign in to manage digital signage</div>
            </div>

            {% if error %}
            <div class="alert alert--error">
                <span>⚠</span> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="Enter your username" value="{{ request.form.username }}"
                           autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter your password">
                </div>
                <button class="btn btn--primary" type="submit" style="width:100%">Sign In</button>
            </form>

            <div class="login-card__footer">
                <a href="/changelog">View Changelog</a>
            </div>
        </div>
    </div>
</body>
</html>
